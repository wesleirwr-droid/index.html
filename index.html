<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Higienização</title>
  
  <!-- Ícone para o Aplicativo -->
  <link rel="apple-touch-icon" href="https://flaticon.com">
  <link rel="icon" href="https://flaticon.com">

  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    h1 { margin-bottom: 20px; font-size: 24px; text-align: center; }
    .card { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; max-width: 400px; box-sizing: border-box; }
    label { display: block; margin-top: 15px; font-size: 13px; color: #94a3b8; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #fff; margin-top: 5px; box-sizing: border-box; }
    button { width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-calc { background: #22c55e; color: #fff; }
    .btn-meta { background: #3b82f6; color: #fff; }
    .btn-share { background: #25d366; color: #fff; }
    .btn-backup { background: #64748b; color: #fff; font-size: 14px; }
    .btn-clear { background: #ef4444; color: #fff; font-size: 12px; padding: 8px; width: auto; display: block; margin: 15px auto 0; }
    .result { margin-top: 20px; font-size: 18px; text-align: center; font-weight: bold; }
    
    .total-container { background: #334155; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 15px; border: 1px solid #22c55e; }
    .total-valor { font-size: 22px; color: #22c55e; display: block; font-weight: bold; }
    .history-list { margin-top: 10px; max-height: 250px; overflow-y: auto; }
    .history-item { font-size: 13px; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #334155; }
    .pos { color: #22c55e; }
    .neg { color: #ef4444; }
  </style>
</head>
<body>

  <h1>💰 Controle de Higienização</h1>

  <!-- NOVO SERVIÇO -->
  <div class="card">
    <h2>Novo Serviço</h2>
    <label>Descrição</label>
    <input type="text" id="servico" placeholder="Ex: Higienização Sofá">
    <label>Valor Cobrado (R$)</label>
    <input type="number" id="valor" placeholder="0.00">
    <label>Custo (R$)</label>
    <input type="number" id="custo" placeholder="0.00">
    <button class="btn-calc" onclick="calcular()">Salvar no Histórico</button>
    <div class="result" id="resultado"></div>
  </div>

  <!-- META MENSAL -->
  <div class="card">
    <h2>Meta Mensal</h2>
    <label>Quanto quer lucrar (R$)</label>
    <input type="number" id="meta" placeholder="5000.00">
    <label>Dias de trabalho</label>
    <input type="number" id="dias" value="22">
    <button class="btn-meta" onclick="metaCalc()">Calcular Meta Diária</button>
    <div class="result" id="metaResultado"></div>
  </div>

  <!-- RESUMO E HISTÓRICO -->
  <div class="card">
    <h2>Resumo Acumulado</h2>
    <div class="total-container">
      <span style="font-size: 14px; color: #cbd5e1;">Lucro Total Geral:</span>
      <span id="totalAcumulado" class="total-valor">R$ 0,00</span>
    </div>
    
    <div id="listaHistorico" class="history-list"></div>
    
    <button class="btn-share" onclick="compartilhar()">📲 Enviar Relatório WhatsApp</button>
    <button class="btn-backup" onclick="fazerBackup()">💾 Baixar Backup (Arquivo)</button>
    <button class="btn-clear" onclick="limparHistorico()">Limpar Tudo</button>
  </div>

  <script>
    window.onload = exibirHistorico;

    function calcular() {
      const nome = document.getElementById('servico').value || "Serviço";
      const valor = parseFloat(document.getElementById('valor').value);
      const custo = parseFloat(document.getElementById('custo').value);
      if (isNaN(valor) || isNaN(custo)) return alert("Preencha os valores!");

      const lucro = valor - custo;
      salvarNoHistorico(nome, lucro);
      
      document.getElementById('servico').value = "";
      document.getElementById('valor').value = "";
      document.getElementById('custo').value = "";
      document.getElementById('resultado').innerHTML = `Salvo! Lucro: R$ ${lucro.toFixed(2)}`;
      setTimeout(() => document.getElementById('resultado').innerHTML = "", 2000);
    }

    function salvarNoHistorico(nome, lucro) {
      let historico = JSON.parse(localStorage.getItem('historico')) || [];
      historico.unshift({ nome, lucro, data: new Date().toLocaleDateString('pt-BR') });
      localStorage.setItem('historico', JSON.stringify(historico));
      exibirHistorico();
    }

    function exibirHistorico() {
      const lista = document.getElementById('listaHistorico');
      const totalDisplay = document.getElementById('totalAcumulado');
      const historico = JSON.parse(localStorage.getItem('historico')) || [];
      let somaTotal = 0;

      lista.innerHTML = historico.map(item => {
        somaTotal += item.lucro;
        return `
          <div class="history-item" style="border-left-color: ${item.lucro >= 0 ? '#22c55e' : '#ef4444'}">
            <div><strong>${item.nome}</strong><br><small style="color:#64748b">${item.data}</small></div>
            <span class="${item.lucro >= 0 ? 'pos' : 'neg'}">R$ ${item.lucro.toFixed(2)}</span>
          </div>`;
      }).join('');

      totalDisplay.innerText = `R$ ${somaTotal.toFixed(2)}`;
      totalDisplay.style.color = somaTotal >= 0 ? '#22c55e' : '#ef4444';
    }

    function metaCalc() {
      const meta = parseFloat(document.getElementById('meta').value);
      const dias = parseInt(document.getElementById('dias').value);
      if(meta > 0 && dias > 0) {
        const diaria = meta / dias;
        document.getElementById('metaResultado').innerHTML = `Meta diária: <span style="color: #3b82f6;">R$ ${diaria.toFixed(2)}</span>`;
      }
    }

    function compartilhar() {
      const historico = JSON.parse(localStorage.getItem('historico')) || [];
      if (historico.length === 0) return alert("Histórico vazio!");
      let texto = `📊 *RELATÓRIO DE SERVIÇOS*\n\n`;
      let total = 0;
      historico.forEach(item => {
        texto += `• ${item.nome}: R$ ${item.lucro.toFixed(2)} (${item.data})\n`;
        total += item.lucro;
      });
      texto += `\n💰 *LUCRO TOTAL: R$ ${total.toFixed(2)}*`;
      window.open(`https://whatsapp.com{encodeURIComponent(texto)}`, '_blank');
    }

    function fazerBackup() {
      const dados = localStorage.getItem('historico');
      if (!dados) return alert("Não há dados.");
      const blob = new Blob([dados], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_financeiro.json`;
      a.click();
    }

    function limparHistorico() {
      if(confirm("Apagar todos os dados permanentemente?")) {
        localStorage.removeItem('historico');
        exibirHistorico();
      }
    }
  </script>
</body>
  </html>
