<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weslei R. Higienização - Gestão</title>
  <link rel="icon" href="https://githubusercontent.com">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .logo-container { text-align: center; margin: 10px 0 20px 0; }
    .logo-container img { max-width: 140px; height: auto; border-radius: 12px; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); background: #fff; padding: 5px; }
    .brand-name { display: block; font-size: 18px; font-weight: bold; color: #3b82f6; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
    .card { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; max-width: 450px; box-sizing: border-box; border: 1px solid #334155; }
    h2 { font-size: 14px; margin: 0 0 15px 0; color: #3b82f6; text-transform: uppercase; border-bottom: 1px solid #334155; padding-bottom: 5px; }
    label { display: block; margin-top: 12px; font-size: 13px; color: #94a3b8; }
    select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #fff; margin-top: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-calc { background: #22c55e; color: #fff; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .res-box { background: #0f172a; padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px solid #3b82f6; text-align: center; }
    .ref-table { width: 100%; font-size: 11px; margin-top: 15px; border-collapse: collapse; color: #94a3b8; }
    .ref-table th { text-align: left; color: #3b82f6; padding-bottom: 5px; }
    .ref-table td { padding: 4px 0; border-bottom: 1px solid #334155; }
    .total-valor { font-size: 32px; color: #22c55e; font-weight: bold; display: block; text-align: center; }
    .progress-bg { background: #334155; border-radius: 20px; height: 18px; width: 100%; margin: 10px 0; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #1d4ed8, #22c55e); height: 100%; width: 0%; transition: width 1s ease-in-out; }
    .history-item { font-size: 13px; background: #0f172a; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #22c55e; }
    .delete-btn { color: #ef4444; background: none; border: none; font-size: 22px; cursor: pointer; padding: 0 10px; }
    #boxQtd { background: #0f172a; padding: 12px; border-radius: 10px; margin-top: 10px; border: 1px solid #fbbf24; display: none; }
  </style>
</head>
<body>

  <div class="logo-container">
    <img src="https://githubusercontent.com" alt="Weslei R. Logo">
    <span class="brand-name">Weslei R.<br>Higienização de estofados</span>
  </div>

  <!-- CALCULADORA DE DILUIÇÃO -->
  <div class="card">
    <h2>🧪 Diluição de Produtos</h2>
    <label>Frasco (ml)</label>
    <input type="number" id="volumeFrasco" value="500">
    <label>Diluição (1:...)</label>
    <select id="proporcaoDiluicao">
      <option value="5">1:5 (Pesada)</option>
      <option value="10" selected>1:10 (Média)</option>
      <option value="20">1:20 (Manutenção)</option>
      <option value="30">1:30 (Leve/Manutenção)</option>
      <option value="40">1:40 (Leve)</option>
      <option value="60">1:60 (Extratora)</option>
    </select>
    <button class="btn-blue" onclick="calcularDiluicao()">Calcular Medidas</button>
    <div id="resultadoDiluicao" class="res-box" style="display:none;">
      <strong id="msgProduto" style="color: #22c55e; font-size: 18px;"></strong><br>
      <span id="msgAgua" style="color: #94a3b8;"></span>
    </div>
    <table class="ref-table">
      <thead><tr><th>Produto</th><th>Diluição</th></tr></thead>
      <tbody>
        <tr><td>PLURI / KLYO</td><td>1:5 a 1:30</td></tr>
        <tr><td>OXI / INTENSE</td><td>1:10 a 1:20</td></tr>
        <tr><td>EXTRATORA</td><td>1:60 a 1:100</td></tr>
      </tbody>
    </table>
  </div>

  <!-- REGISTRO DE SERVIÇOS -->
  <div class="card">
    <h2> Couch Novo Registro</h2>
    <select id="selectServico" onchange="atualizarCampos()">
      <option value="">-- Selecione --</option>
      <optgroup label="CADEIRAS"><option value="promo|cadeira">🪑 Cadeiras (Promo 4=80 / 6=100)</option></optgroup>
      <optgroup label="VEÍCULOS"><option value="100|120|🚗 Bancos">🚗 Bancos (R$120)</option><option value="195|220|🚗 Completo (Intense/Restaurax)">🚗 Completo (R$220)</option></optgroup>
      <optgroup label="SOFÁS"><option value="90|120|🛋️ Sofá 2 lug">🛋️ Sofá 2 lug (R$120)</option><option value="110|150|🛋️ Sofá 3 lug">🛋️ Sofá 3 lug (R$150)</option><option value="140|180|🛋️ Sofá Grande">🛋️ Sofá Grande (R$180+)</option></optgroup>
      <optgroup label="COLCHÕES"><option value="65|80|🛏️ Solteiro">🛏️ Solteiro (R$80)</option><option value="100|120|🛏️ Casal">🛏️ Casal (R$120)</option><option value="120|150|🛏️ Queen">🛏️ Queen (R$150)</option><option value="140|180|🛏️ King">🛏️ King (R$180)</option></optgroup>
      <optgroup label="POLTRONAS"><option value="55|70|💺 Peq">💺 Poltrona P (R$70)</option><option value="70|90|💺 Méd">💺 Poltrona M (R$90)</option><option value="90|120|💺 Gde">💺 Poltrona G/Recl (R$120)</option></optgroup>
      <option value="0|0|⚙️ Outro">⚙️ Personalizado</option>
    </select>

    <div id="boxQtd">
      <label>Quantidade de Unidades</label>
      <input type="number" id="qtd" value="1" min="1" oninput="calcularCadeiraHigi()">
    </div>
    
    <label>Valor Final (R$)</label><input type="number" id="valor" placeholder="0.00">
    <label>Custo Prod. (R$)</label><input type="number" id="custo" placeholder="0.00">
    <label>Seu Lucro (R$)</label><input type="number" id="maodeobra" placeholder="0.00" oninput="ajustarManual()">
    <button class="btn-calc" onclick="salvarServico()">Salvar Entrada</button>
  </div>

  <div class="card">
    <h2>📊 Lucro Mensal Real</h2>
    <span id="totalAcumulado" class="total-valor">R$ 0,00</span>
    <div class="progress-bg"><div id="progressBar" class="progress-bar"></div></div>
    <div id="listaHistorico" style="margin-top: 15px;"></div>
    <button onclick="compartilhar()" style="background:#25d366; color:white; font-weight: bold;">📲 WhatsApp</button>
    <button onclick="limpar()" style="background:none; color:#ef4444; font-size:11px; margin-top:10px; width:100%;">Zerar</button>
  </div>

  <script>
    const CHAVE = "WESLEI_GESTAO_FINAL_PRO_V3"; 
    window.onload = exibir;

    function calcularDiluicao() {
      const vol = parseFloat(document.getElementById('volumeFrasco').value);
      const prop = parseFloat(document.getElementById('proporcaoDiluicao').value);
      const mlProd = vol / (1 + prop);
      document.getElementById('resultadoDiluicao').style.display = "block";
      document.getElementById('msgProduto').innerText = `${mlProd.toFixed(1)} ml de Produto`;
      document.getElementById('msgAgua').innerText = `Com ${(vol - mlProd).toFixed(1)} ml de Água`;
    }

    function atualizarCampos() {
      const s = document.getElementById('selectServico');
      const b = document.getElementById('boxQtd');
      if (s.value === "promo|cadeira") {
        b.style.display = "block";
        calcularCadeiraHigi();
      } else if (s.value && s.value !== "0|0|⚙️ Outro") {
        b.style.display = "none";
        const [lucro, preco] = s.value.split('|');
        document.getElementById('valor').value = preco;
        document.getElementById('custo').value = (preco - lucro).toFixed(2);
        document.getElementById('maodeobra').value = lucro;
      } else { b.style.display = "none"; }
    }

    function calcularCadeiraHigi() {
      const q = parseInt(document.getElementById('qtd').value) || 1;
      let preco = q < 4 ? q * 25 : (q < 6 ? 80 : Math.max(100, q * 16.666));
      document.getElementById('valor').value = preco.toFixed(2);
      document.getElementById('custo').value = (q * 3).toFixed(2);
      document.getElementById('maodeobra').value = (preco - (q * 3)).toFixed(2);
    }

    function ajustarManual() {
      const c = parseFloat(document.getElementById('custo').value) || 0;
      const m = parseFloat(document.getElementById('maodeobra').value) || 0;
      document.getElementById('valor').value = (c + m).toFixed(2);
    }

    function salvarServico() {
      const v = parseFloat(document.getElementById('valor').value);
      const c = parseFloat(document.getElementById('custo').value);
      if (isNaN(v) || isNaN(c)) return;
      const s = document.getElementById('selectServico');
      let nome = s.options[s.selectedIndex].text;
      if (s.value === "promo|cadeira") nome = `🪑 Cadeiras (${document.getElementById('qtd').value}x)`;
      addHist(nome, (v - c));
    }

    function addHist(nome, valor) {
      let h = JSON.parse(localStorage.getItem(CHAVE)) || [];
      h.unshift({ id: Date.now(), nome, valor, data: new Date().toLocaleDateString('pt-BR') });
      localStorage.setItem(CHAVE, JSON.stringify(h));
      exibir();
    }

    function excluirItem(id) {
      if(confirm("Excluir?")) {
        let h = JSON.parse(localStorage.getItem(CHAVE)) || [];
        h = h.filter(i => i.id !== id);
        localStorage.setItem(CHAVE, JSON.stringify(h));
        exibir();
      }
    }

    function exibir() {
      const h = JSON.parse(localStorage.getItem(CHAVE)) || [];
      let s = 0;
      document.getElementById('listaHistorico').innerHTML = h.map(i => {
        s += i.valor;
        return `<div class="history-item">
          <div><strong>${i.nome}</strong><br><small>${i.data}</small></div>
          <div style="display:flex; align-items:center; gap:10px;">
            <span style="color:#22c55e">R$ ${i.valor.toFixed(2)}</span>
            <button class="delete-btn" onclick="excluirItem(${i.id})">×</button>
          </div>
        </div>`;
      }).join('');
      document.getElementById('totalAcumulado').innerText = `R$ ${s.toFixed(2)}`;
      document.getElementById('progressBar').style.width = Math.min((s / 5000) * 100, 100) + "%";
    }

    function compartilhar() {
      const h = JSON.parse(localStorage.getItem(CHAVE)) || [];
      let t = `📊 *RESUMO WESLEI R. HIGIENIZAÇÃO*\n\n`;
      let s = 0;
      h.forEach(i => { t += `✅ ${i.nome}: R$ ${i.valor.toFixed(2)}\n`; s += i.valor; });
      t += `\n💰 *LUCRO: R$ ${s.toFixed(2)}*`;
      window.open(`https://whatsapp.com{encodeURIComponent(t)}`);
    }

    function limpar() { if(confirm("Zerar?")) { localStorage.removeItem(CHAVE); exibir(); } }
  </script>
</body>
</html>
