<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HigiExpert Pro - Gestão Total</title>
  <link rel="icon" href="https://flaticon.com">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .card { background: #1e293b; padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%; max-width: 450px; box-sizing: border-box; }
    h2 { font-size: 18px; margin: 0 0 15px 0; color: #3b82f6; }
    label { display: block; margin-top: 12px; font-size: 13px; color: #94a3b8; }
    select, input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: #fff; margin-top: 5px; box-sizing: border-box; font-size: 16px; }
    button { width: 100%; padding: 14px; border: none; border-radius: 12px; margin-top: 15px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-calc { background: #22c55e; color: #fff; }
    .btn-extra { background: #f59e0b; color: #fff; }
    .btn-blue { background: #3b82f6; color: #fff; }
    .meta-box { background: #0f172a; padding: 15px; border-radius: 12px; margin-top: 10px; border: 1px solid #334155; }
    .progress-bg { background: #334155; border-radius: 20px; height: 18px; width: 100%; margin: 10px 0; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #3b82f6, #22c55e); height: 100%; width: 0%; transition: width 0.5s; }
    .total-valor { font-size: 28px; color: #22c55e; font-weight: bold; display: block; text-align: center; }
    .history-item { font-size: 13px; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; border-left: 4px solid #22c55e; }
    .item-gasto { border-left-color: #ef4444; }
    .calc-res { background: #334155; padding: 10px; border-radius: 8px; margin-top: 10px; text-align: center; font-weight: bold; color: #fbbf24; }
  </style>
</head>
<body>

  <h1>💰 HigiExpert Pro</h1>

  <!-- REGISTRO DE SERVIÇOS -->
  <div class="card">
    <h2>🛋️ Novo Serviço</h2>
    <select id="selectServico" onchange="atualizarCampos()">
      <option value="">-- Escolha um serviço --</option>
      <option value="90|120|Sofá 2 lugares">Sofá 2 lugares (R$120)</option>
      <option value="110|150|Sofá 3 lugares">Sofá 3 lugares (R$150)</option>
      <option value="140|180|Sofá Grande">Sofá Grande (R$180+)</option>
      <option value="65|80|Colchão Solteiro">Colchão Solteiro (R$80)</option>
      <option value="100|120|Colchão Casal">Colchão Casal (R$120)</option>
      <option value="100|120|Carro Bancos">Carro - Bancos (R$120)</option>
      <option value="200|220|Carro Completo">Carro - Completo (R$220)</option>
      <option value="0|0|Personalizado">Personalizado</option>
    </select>
    
    <label>Valor Cobrado (R$)</label>
    <input type="number" id="valor" placeholder="0.00">
    
    <label>Custo Produtos (R$)</label>
    <input type="number" id="custo" placeholder="0.00">
    
    <label>Sua Mão de Obra (R$)</label>
    <input type="number" id="maodeobra" placeholder="Quanto você quer ganhar?" value="50">
    
    <button class="btn-calc" onclick="salvarServico()">Salvar Serviço</button>
  </div>

  <!-- GASTOS EXTRAS -->
  <div class="card" style="border: 1px solid #ef4444;">
    <h2>⛽ Outros Gastos</h2>
    <select id="tipoGasto">
      <option value="Gasolina">⛽ Gasolina</option>
      <option value="Alimentação">🍔 Alimentação</option>
      <option value="Ajudante">👥 Ajudante Externo</option>
      <option value="Marketing">📱 Marketing</option>
    </select>
    <input type="number" id="valorGasto" placeholder="Valor R$">
    <button class="btn-extra" onclick="salvarGasto()">Registrar Gasto</button>
  </div>

  <!-- RESUMO E META -->
  <div class="card">
    <h2>📊 Lucro Líquido Real</h2>
    <span id="totalAcumulado" class="total-valor">R$ 0,00</span>

    <div class="meta-box">
      <label>Meta Mensal (R$)</label>
      <input type="number" id="inputMeta" value="5000" onchange="exibir()">
      <div class="progress-bg"><div id="progressBar" class="progress-bar"></div></div>
      <div style="display: flex; justify-content: space-between; font-size: 11px; color:#94a3b8;">
        <span id="txtProgresso">0%</span>
        <span id="txtFalta">Falta: R$ 0,00</span>
      </div>
    </div>

    <div id="listaHistorico" style="margin-top: 15px;"></div>
    <button onclick="compartilhar()" style="background:#25d366; color:white;">📲 Enviar WhatsApp</button>
    <button onclick="limpar()" style="background:none; color:#ef4444; font-size:11px; margin-top:15px; width:100%;">Zerar Mês</button>
  </div>

  <script>
    window.onload = exibir;

    function atualizarCampos() {
      const select = document.getElementById('selectServico');
      if (select.value && select.value !== "0|0|Personalizado") {
        const [lucro, preco] = select.value.split('|');
        document.getElementById('valor').value = preco;
        document.getElementById('custo').value = (preco - lucro).toFixed(2);
      }
    }

    function salvarServico() {
      const v = parseFloat(document.getElementById('valor').value);
      const c = parseFloat(document.getElementById('custo').value);
      const m = parseFloat(document.getElementById('maodeobra').value) || 0;
      if (isNaN(v) || isNaN(c)) return alert("Preencha os valores!");
      
      const lucroReal = v - c - m;
      const nome = document.getElementById('selectServico').value.split('|')[2] || "Serviço";
      addHist(`${nome} (-R$${m} M.O)`, lucroReal, 'servico');
    }

    function salvarGasto() {
      const v = parseFloat(document.getElementById('valorGasto').value);
      if (isNaN(v)) return;
      addHist(document.getElementById('tipoGasto').value, -v, 'gasto');
      document.getElementById('valorGasto').value = "";
    }

    function addHist(nome, valor, tipo) {
      let hist = JSON.parse(localStorage.getItem('higi_v5')) || [];
      hist.unshift({ nome, valor, tipo, data: new Date().toLocaleDateString('pt-BR') });
      localStorage.setItem('higi_v5', JSON.stringify(hist));
      exibir();
    }

    function exibir() {
      const hist = JSON.parse(localStorage.getItem('higi_v5')) || [];
      const meta = parseFloat(document.getElementById('inputMeta').value) || 1;
      let soma = 0;

      document.getElementById('listaHistorico').innerHTML = hist.map(i => {
        soma += i.valor;
        return `<div class="history-item ${i.tipo === 'gasto' ? 'item-gasto' : ''}">
          <div><strong>${i.nome}</strong><br><small>${i.data}</small></div>
          <span style="color: ${i.valor >= 0 ? '#22c55e' : '#ef4444'}">R$ ${i.valor.toFixed(2)}</span>
        </div>`;
      }).join('');

      document.getElementById('totalAcumulado').innerText = `R$ ${soma.toFixed(2)}`;
      let p = Math.min((soma / meta) * 100, 100);
      document.getElementById('progressBar').style.width = (soma > 0 ? p : 0) + "%";
      document.getElementById('txtProgresso').innerText = (soma > 0 ? p.toFixed(1) : 0) + "%";
      document.getElementById('txtFalta').innerText = `Falta: R$ ${Math.max(meta - soma, 0).toFixed(2)}`;
    }

    function compartilhar() {
      const hist = JSON.parse(localStorage.getItem('higi_v5')) || [];
      let total = 0;
      let t = `📊 *RELATÓRIO HIGIEXPERT*\n\n`;
      hist.forEach(i => { t += `${i.valor >= 0 ? '✅' : '🔴'} ${i.nome}: R$ ${i.valor.toFixed(2)}\n`; total += i.valor; });
      t += `\n💰 *LUCRO EMPRESA: R$ ${total.toFixed(2)}*`;
      window.open(`https://whatsapp.com{encodeURIComponent(t)}`);
    }

    function limpar() { if(confirm("Zerar mês?")) { localStorage.removeItem('higi_v5'); exibir(); } }
  </script>
</body>
</html>
